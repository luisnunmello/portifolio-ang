<div
  (mouseenter)="pararIntervalo()"
  (mouseleave)="criarIntervalo()"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd()"
  class="relative h-full overflow-hidden"
>
  <div class="button-container absolute bottom-12 z-30 flex gap-4 w-full justify-center text-xs items-center font-bold">
    <button class="aspect-square w-8 bg-white rounded-xl text-blue-700 hover:bg-blue-100 duration-75 active:bg-blue-700 active:text-white" (click)="anteriorProjeto()"><</button>
    @for (project of projects; track i; let i = $index) {
      <button
        (click)="changeProject(i)"
        [class]="`h-8 aspect-square shadow-md rounded-full duration-75 ${iProjetoAtual === i ? 'bg-blue-700 text-white' : 'bg-white hover:bg-blue-100 text-blue-700'}`"
      >{{i + 1}}</button>
    }
    <button class="aspect-square w-8 bg-white rounded-xl text-blue-700 hover:bg-blue-100 duration-75 active:bg-blue-700 active:text-white" (click)="this.proximoProjeto()">></button>
  </div>
  <div class="bottom-0 absolute bg-green-200 h-2 z-30 duration-200" [style.width.%]="(intervalo / tempoParaTrocar) * 100"></div>

  @for (project of projects; track i; let i = $index) {
    <div class="h-full w-full bg-white absolute duration-150 rounded-xl overflow-hidden"
      [style.transform]="'translateX(calc(' + ((100 * i) - (100 * iProjetoAtual)) + '% + ' + ((isTouching && isDragging) ? posAtualDrag - posInicialDrag.x : 0) + 'px))'">
      <div class="black-overlay absolute h-full w-full bg-black/20 z-30"></div>
      <a [routerLink]="project?.id ? '/proj/' + project.id : '#'" class="absolute w-full h-full z-30 hover:bg-black/5 duration-75"></a>
      <img class="absolute h-full w-full object-contain" [src]="project.images[0] ? urlImagens + project.images[0].id : ''" [alt]="project.description ? project.description : 'imagem project ' + project.images" width="1280" height="720"/>
    </div>
  }
</div>
