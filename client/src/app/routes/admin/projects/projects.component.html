<app-admin-page-card>
    <header class="flex w-full gap-4">
        <a routerLink="/admin" class="p-2 border border-slate-200 hover:bg-slate-50 hover:border-slate-300 rounded-lg aspect-square flex items-center">
            <i class="pi pi-angle-left"></i>
        </a>
        <p class="text-2xl">Projetos</p>
    </header>
    <div class="projects-holder flex flex-col gap-4">
        @for (project of projects(); track project.id) {
            <a class="p-4 border border-slate-200 flex gap-4 hover:bg-slate-50 hover:border-slate-300 rounded-lg" [href]="`/admin/projects/edit?id=${project.id}`">
                <img [src]="`${imagesUrl}${project.images?.at(0)?.id}`" alt="" class="w-24 object-contain">
                <div class="flex flex-col">
                    <p class="text-lg">
                        {{project.name}}
                    </p>
                    <p class="text-slate-700"> {{project.description}}</p>
                </div>
            </a>
        }
    </div>
    <a routerLink="create" class="relative skill ml-auto w-fit py-2 px-4 border border-slate-200 flex gap-2 justify-start hover:border-slate-300 hover:bg-slate-50 cursor-pointer rounded-lg overflow-hidden">Criar novo projeto</a>
</app-admin-page-card>
