
<app-admin-page-card>
    <header class="flex w-full gap-4">
        <a routerLink="/admin/projects" class="p-2 border border-slate-200 hover:bg-slate-50 hover:border-slate-300 rounded-lg aspect-square flex items-center">
            <i class="pi pi-angle-left"></i>
        </a>
        <p class="text-2xl">Project</p>
    </header>
    <form [formGroup]="form" class="flex flex-col gap-4">

   
        <div class="flex flex-col gap-4 input-holder max-w-lg">
            <div class="flex flex-col gap-2">
                <label for="name-input">Name</label>
                <input id="name-input" class="p-2 border border-slate-200 rounded-lg" #nameInput formControlName="name">
            </div>
            <div class="flex flex-col gap-2">
                <label for="description-input">Description</label>
                <input id="description-input" class="p-2 border border-slate-200 rounded-lg" #descriptionInput formControlName="description">
            </div>
            <div class="flex flex-col gap-2">
                <label for="repo-input">Repo</label>
                <input id="repo-input" class="p-2 border border-slate-200 rounded-lg" #repoInput formControlName="repo"> 
            </div>
            <div class="flex flex-col gap-2">
                <label for="website-input">Website</label>
                <input id="website-input" class="p-2 border border-slate-200 rounded-lg" #websiteInput formControlName="website">
            </div>
            <div class="flex flex-col gap-2">
                <label for="download-input">Download</label>
                <input id="download-input" class="p-2 border border-slate-200 rounded-lg" #downloadInput formControlName="download">
            </div>
            <div class="flex flex-col gap-2">
                <label for="status-input">Status</label>
                <select id="status-input" class="p-2 border border-slate-200 rounded-lg" #statusSelect formControlName="status">
                    <option value="COMPLETE">Completo</option>
                    <option value="INPROGRESS">Em Progresso</option>
                    <option value="INCOMPLETE">Incompleto</option>
                </select>
            </div>
            <fieldset>
                <legend>Skills used in project</legend>
                
                @for (skill of skills; track skill.id) {
                    <div>
                        <input type="checkbox" [id]="'skill-'+ skill.name" [checked]="isSkillChecked(skill)" (change)="toggleSkill($event, skill)"/>
                        <label [for]="'skill-'+ skill.name">{{skill.name}}({{skill.type}})</label>
                    </div>
                }
                
            
            </fieldset>
            <div class="image-holder flex flex-col gap-4">
                <span>
                    Project Images (first will be thumbnail)
                </span>

                <div class="images flex gap-4 overflow-x-auto">
                    @for (image of form.getRawValue().images; track image.id) {
                        <img [src]="imagesUrl + image.id" [alt]="`Image number ${$index + 1}`" class="" style="max-height: 400px;">
                    }
                    @for (image of images; track image) {
                        <img [src]="image.blob" [alt]="`Image number ${$index + 1}`" class="" style="max-height: 400px;">
                    }
                </div>
                
                <div  class="image-selector p-4 max-w-xs border border-slate-200 rounded-lg flex flex-col justify-center items-center">
                    <label for="input-image" class="flex-1">Select an image</label>
                    <input (change)="onChangeImages($event)" type="file" multiple name="" accept="image/png, image/gif, image/jpeg, image/jpg" id="input-image" class="flex-1 text-center" #imagesInput>
                </div>
            </div>
        </div>
        
        <div class="flex">
            @if (form.getRawValue().id) {
                <button class="p-2 border border-red-200 hover:border-red-300 hover:bg-red-50 rounded-lg h-fit cursor-pointer w-fit text-red-800" (click)="removeProject()">Remove Project</button>
                <button class="p-2 border border-green-200 hover:border-green-300 hover:bg-green-50 rounded-lg h-fit cursor-pointer w-fit ml-auto text-green-800" (click)="clickSubmit()">Edit</button>
            } @else {
                <button class="p-2 border border-green-200 hover:border-green-300 hover:bg-green-50 rounded-lg h-fit cursor-pointer w-fit ml-auto text-green-800" (click)="clickSubmit()">Create</button>
            }
        </div>
    </form>
</app-admin-page-card>
